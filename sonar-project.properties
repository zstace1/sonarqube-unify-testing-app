# SonarQube Configuration for SDLC Metrics Demo
# This file configures SonarQube static analysis

# Project identification
sonar.projectKey=sdlc-demo-app-testing
sonar.projectName=SDLC Metrics Demo Application (Testing)
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=src

# Source encoding
sonar.sourceEncoding=UTF-8

# Language-specific settings
sonar.language=multi

# Python specific settings
sonar.python.version=3.11

# C/C++ specific settings (if SonarQube C++ plugin is installed)
sonar.cfamily.build-wrapper-output=build-wrapper-output

# Exclude patterns
sonar.exclusions=**/test-results/**,**/build/**,**/__pycache__/**,**/*.pyc

# Coverage reports (if generated)
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results/pytest-results.xml

# Duplicate detection
sonar.cpd.exclusions=**/tests/**
